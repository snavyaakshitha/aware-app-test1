// ─── Verdict derivation — NO HARDCODING ───────────────────────────────────────
// Mirrors the logic that will live in ScanResultScreen.tsx
function deriveVerdict(p) {
  const { safety, additives, nova, nutriscore } = p;
  // 1. Allergen conflicts → always Avoid
  if (safety.allergenConflicts.length > 0) return 'avoid';
  // 2. Personalized conflicts or high-severity additives → Check
  if (safety.avoidList.length > 0) return 'check';
  if (safety.cautionList.length > 0) return 'check';
  if (additives.some(a => a.severity === 'severe' || a.severity === 'high')) return 'check';
  // 3. Positive signals → Good
  const hasPositive =
    safety.beneficialList.length > 0 ||
    nova === 1 ||
    (nutriscore !== null && ['a', 'b'].includes(nutriscore));
  if (hasPositive) return 'good';
  // 4. Nothing notable either way → Acceptable
  return 'acceptable';
}

const verdictLabels = { avoid: 'Avoid', check: 'Check', acceptable: 'Acceptable', good: 'Good' };
const verdictSubtitles = {
  avoid: 'Conflicts with your profile',
  check: 'Some ingredients to know about',
  acceptable: 'Nothing alarming found',
  good: 'A genuinely good choice',
};

// ─── Nutri-Score / NOVA modal content ─────────────────────────────────────────
const nutriscoreInfo = {
  a: { color: '#00843d', desc: 'Excellent nutritional quality' },
  b: { color: '#85bb2f', desc: 'Good nutritional quality' },
  c: { color: '#fecb02', desc: 'Average nutritional quality' },
  d: { color: '#ee8100', desc: 'Poor nutritional quality' },
  e: { color: '#e63312', desc: 'Very poor nutritional quality' },
};
const novaInfo = {
  1: { color: '#2ed573', title: 'Unprocessed or minimally processed', desc: 'Natural foods with no or minimal industrial processing. Fruits, vegetables, eggs, meat, milk, legumes, plain grains.' },
  2: { color: '#ffa502', title: 'Processed culinary ingredients', desc: 'Substances extracted from foods or nature: oils, butter, sugar, salt, flour. Used in cooking, not eaten alone.' },
  3: { color: '#ff6b35', title: 'Processed foods', desc: 'Products made by adding salt, sugar or other substances to Group 1 foods. Canned fish, cheese, cured meats, freshly baked bread.' },
  4: { color: '#e63312', title: 'Ultra-processed foods', desc: 'Industrial formulations with 5+ ingredients, many not found in a typical kitchen: additives, colorings, flavor enhancers, emulsifiers. Associated with higher risk of obesity, diabetes, and cardiovascular disease in large cohort studies.' },
};

// ─── Modal ─────────────────────────────────────────────────────────────────────
function openModal(html) {
  document.getElementById('modal-body-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}

function showAdditiveModal(key, idx) {
  const p = products[key];
  const a = p.additives[idx];
  const colors = { severe: '#ff2d55', high: '#ff6b35', medium: '#ffb830', low: '#8e8e93' };
  const bgColors = { severe: '#3d0a14', high: '#2e1500', medium: '#2e2000', low: '#222' };
  openModal(`
    <div class="modal-badge" style="background:${bgColors[a.severity]};color:${colors[a.severity]}">
      <span style="width:8px;height:8px;border-radius:50%;background:${colors[a.severity]};display:inline-block;"></span>
      ${a.severity.toUpperCase()} CONCERN
    </div>
    <div class="modal-title">${a.name}</div>
    <div class="divider"></div>
    <div class="modal-section">
      <div class="modal-section-label">What it is</div>
      <div class="modal-body">${a.reason}</div>
    </div>
    ${a.source ? `
    <div class="modal-section">
      <div class="modal-section-label">Source</div>
      <div class="modal-source">
        <span class="modal-source-icon">🔗</span>
        <span class="modal-source-text">${a.sourceLabel || a.source}</span>
        <span class="modal-source-arrow">›</span>
      </div>
    </div>` : ''}
    <div class="modal-section" style="background:#1a1a1a;border-radius:12px;padding:12px;border:1px solid #2a2a2a;">
      <div class="modal-section-label" style="margin-bottom:6px;">Context</div>
      <div class="modal-body" style="font-size:12px;">
        ${a.severity === 'severe' ? 'This ingredient has strong evidence of harm. Avoiding it is recommended regardless of quantity.' :
          a.severity === 'high' ? 'This ingredient has significant concerns backed by multiple studies. Worth limiting in your regular diet.' :
          a.severity === 'medium' ? 'Evidence is emerging or mixed. Safe at typical doses for most people, but worth being aware of at high intake.' :
          'Low concern at typical dietary exposure. Listed for transparency.'}
      </div>
    </div>
  `);
}

function showBeneficialModal(key, idx) {
  const p = products[key];
  const b = p.beneficial[idx];
  openModal(`
    <div class="modal-badge" style="background:#0a1f12;color:#2ed573;border:1px solid #1a5c30;">
      ✦ BENEFICIAL
    </div>
    <div class="modal-title">${b.name}</div>
    <div class="divider"></div>
    <div class="modal-section">
      <div class="modal-section-label">Why it matters</div>
      <div class="modal-body">${b.reason}</div>
    </div>
    ${b.source ? `
    <div class="modal-section">
      <div class="modal-section-label">Source</div>
      <div class="modal-source">
        <span class="modal-source-icon">🔗</span>
        <span class="modal-source-text">${b.sourceLabel || b.source}</span>
        <span class="modal-source-arrow">›</span>
      </div>
    </div>` : ''}
  `);
}

function showNutriscoreModal(grade) {
  const grades = ['a','b','c','d','e'];
  openModal(`
    <div class="modal-title">Nutri-Score</div>
    <div class="modal-subtitle">A front-of-pack nutrition label developed by French public health authorities. Grades A–E based on positive nutrients (fiber, protein, fruits/veg) vs. negative (calories, saturated fat, sugar, salt).</div>
    <div class="nutriscore-explain">
      ${grades.map(g => `
        <div class="ns-explain-item ${g === grade ? 'active' : ''}">
          <div class="ns-grade" style="color:${nutriscoreInfo[g].color}">${g.toUpperCase()}</div>
          <div class="ns-desc">${nutriscoreInfo[g].desc}</div>
        </div>
      `).join('')}
    </div>
    <div class="modal-section">
      <div class="modal-section-label">This product</div>
      <div class="modal-body">Scored <strong style="color:${nutriscoreInfo[grade].color}">${grade.toUpperCase()}</strong> — ${nutriscoreInfo[grade].desc.toLowerCase()}. The Nutri-Score algorithm weighs positive and negative nutritional factors per 100g.</div>
    </div>
    <div class="modal-source" style="margin-top:10px;">
      <span class="modal-source-icon">🔗</span>
      <span class="modal-source-text">Official Nutri-Score methodology — santepubliquefrance.fr</span>
      <span class="modal-source-arrow">›</span>
    </div>
  `);
}

function showNovaModal(group) {
  openModal(`
    <div class="modal-title">NOVA Processing Groups</div>
    <div class="modal-subtitle">Developed by researchers at the University of São Paulo, NOVA classifies foods by the extent and purpose of industrial processing — not by nutrient content.</div>
    <div class="nova-explain-list">
      ${[1,2,3,4].map(n => `
        <div class="nova-explain-row ${n === group ? 'active' : ''}">
          <div class="nova-num" style="background:${novaInfo[n].color}">${n}</div>
          <div class="nova-explain-text">
            <div class="nova-explain-title">${novaInfo[n].title}</div>
            <div class="nova-explain-desc">${novaInfo[n].desc}</div>
          </div>
        </div>
      `).join('')}
    </div>
    <div class="modal-source" style="margin-top:14px;">
      <span class="modal-source-icon">🔗</span>
      <span class="modal-source-text">Monteiro et al. — NOVA classification (Public Health Nutrition)</span>
      <span class="modal-source-arrow">›</span>
    </div>
  `);
}

// ─── Render helpers ────────────────────────────────────────────────────────────
function renderSafety(p, verdict) {
  const { safety } = p;
  if (verdict === 'good' && !safety.allergenConflicts.length && !safety.cautionList.length) {
    return `<div class="card green-border" style="margin-bottom:10px;">
      <div class="card-label">Safety verdict</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:18px;">✓</span>
        <div>
          <div style="font-size:14px;font-weight:600;color:#2ed573;">No conflicts found</div>
          <div style="font-size:12px;color:#666;margin-top:2px;">No allergens or flagged ingredients detected.</div>
        </div>
      </div>
    </div>`;
  }
  let html = `<div class="card ${safety.allergenConflicts.length ? 'red-border' : 'yellow-border'}" style="margin-bottom:10px;">
    <div class="card-label">Safety verdict</div>`;
  if (safety.allergenConflicts.length) {
    html += `<div class="safety-row" style="margin-bottom:10px;">
      <span class="safety-icon">🚨</span>
      <div>
        <div class="safety-title" style="color:#ff4d4d;">Allergen detected</div>
        <div class="safety-desc">Contains: ${safety.allergenConflicts.map(a=>`<span style="color:#ff6b6b;font-weight:600;">${a}</span>`).join(', ')}</div>
      </div>
    </div>`;
  }
  const visible = safety.cautionList.slice(0, 2);
  const hidden = safety.cautionList.slice(2);
  visible.forEach(s => {
    html += `<div class="safety-row"><span class="safety-icon">⚠️</span><div><div class="safety-title">${s.ingredient}</div><div class="safety-desc">${s.reason}</div></div></div>`;
  });
  if (hidden.length) {
    html += `<div class="hidden-items" id="safety-hidden">`;
    hidden.forEach(s => {
      html += `<div class="safety-row"><span class="safety-icon">⚠️</span><div><div class="safety-title">${s.ingredient}</div><div class="safety-desc">${s.reason}</div></div></div>`;
    });
    html += `</div>
    <div class="expand-btn" onclick="toggleExpand()"><span id="expand-arrow">▼</span> <span id="expand-label">See ${hidden.length} more</span></div>`;
  }
  html += `</div>`;
  return html;
}

function toggleExpand() {
  const el = document.getElementById('safety-hidden');
  const arrow = document.getElementById('expand-arrow');
  const label = document.getElementById('expand-label');
  const isOpen = el.classList.toggle('open');
  arrow.textContent = isOpen ? '▲' : '▼';
  label.textContent = isOpen ? 'Show less' : `See more`;
}

function renderNutriNova(p) {
  const grades = ['a','b','c','d','e'];
  const nutriHtml = p.nutriscore ? `
    <div class="metric-card" onclick="showNutriscoreModal('${p.nutriscore}')">
      <div class="metric-label">Nutri-Score</div>
      <div class="nutriscore-track">${grades.map(g=>`<div class="ns-block ns-${g} ${p.nutriscore===g?'active':''}">${g.toUpperCase()}</div>`).join('')}</div>
      <div class="metric-note">${nutriscoreInfo[p.nutriscore].desc}</div>
      <div class="metric-tap-hint">Tap to learn more ›</div>
    </div>` :
    `<div class="metric-card"><div class="metric-label">Nutri-Score</div><div style="font-size:12px;color:#555;margin-top:4px;">Not applicable<br/>for this category</div></div>`;
  const novaHtml = `
    <div class="metric-card" onclick="showNovaModal(${p.nova})">
      <div class="metric-label">Processing (NOVA)</div>
      <div class="nova-blocks">${[1,2,3,4].map(n=>`<div class="nova-block nova-${n} ${p.nova===n?'active':''}">${n}</div>`).join('')}</div>
      <div class="metric-note">${novaInfo[p.nova].title}</div>
      <div class="metric-tap-hint">Tap to learn more ›</div>
    </div>`;
  return `<div class="metrics-row">${nutriHtml}${novaHtml}</div>`;
}

function renderAdditives(p) {
  if (!p.additives.length) return `<div style="font-size:13px;color:#555;padding:6px 0;">No concerning additives detected.</div>`;
  return p.additives.map((a,i) => `
    <div class="additive-item" onclick="showAdditiveModal('${p.key}',${i})">
      <div class="severity-dot sev-${a.severity}"></div>
      <div style="flex:1">
        <div class="additive-name">${a.name}</div>
        <div class="additive-reason">${a.reason}</div>
      </div>
      <div class="sev-badge badge-${a.severity}">${a.severity.toUpperCase()}</div>
    </div>`).join('');
}

function renderBeneficial(p) {
  if (!p.beneficial.length) return '';
  return `<div class="card green-border">
    <div class="card-label">✓ Beneficial ingredients</div>
    ${p.beneficial.map((b,i)=>`
      <div class="beneficial-item" onclick="showBeneficialModal('${p.key}',${i})" style="cursor:pointer;">
        <div style="font-size:15px;flex-shrink:0;margin-top:2px;color:#2ed573;">✦</div>
        <div style="flex:1">
          <div class="beneficial-name">${b.name}</div>
          <div class="beneficial-reason">${b.reason}</div>
        </div>
        <div style="font-size:13px;color:#444;flex-shrink:0;margin-top:2px;">›</div>
      </div>`).join('')}
  </div>`;
}

// ─── Main load ─────────────────────────────────────────────────────────────────
function loadProduct(key, btn) {
  if (btn) {
    document.querySelectorAll('.switcher button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  }
  const p = { ...products[key], key };
  const verdict = deriveVerdict(p);
  const html = `
    <div class="product-header">
      <div class="product-image">${p.emoji}</div>
      <div class="product-meta">
        <div class="product-brand">${p.brand}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-barcode">${p.barcode}</div>
      </div>
    </div>
    <div class="verdict-block">
      <div class="verdict-pill ${verdict}"><div class="verdict-dot"></div>${verdictLabels[verdict]}</div>
      <div style="font-size:12px;color:#666;margin-bottom:8px;">${verdictSubtitles[verdict]}</div>
      <div class="verdict-headline">${p.headline}</div>
      <div class="verdict-subline">${p.subline}</div>
    </div>
    <div class="section-divider"></div>
    ${renderSafety(p, verdict)}
    ${renderNutriNova(p)}
    ${p.servingSizeFlag ? `<div class="serving-banner"><span class="serving-icon">📏</span><div class="serving-text"><strong>Serving size may mislead</strong>Label declares ${p.servingSizeFlag.declared}. Typical use: ${p.servingSizeFlag.realWorld} — that's ${p.servingSizeFlag.sugarsIfReal} sugar.</div></div>` : ''}
    <div class="ai-summary"><div class="ai-label">⚡ Aware's take</div><div class="ai-text">${p.aiSummary}</div></div>
    ${p.regulatory ? `<div class="regulatory-banner"><span class="reg-icon">🌍</span><div class="reg-text"><strong>International regulatory note — ${p.regulatory.substance}</strong>${p.regulatory.note}</div></div>` : ''}
    <div class="card ${p.additives.some(a=>a.severity==='severe'||a.severity==='high')?'red-border':p.additives.some(a=>a.severity==='medium')?'yellow-border':''}">
      <div class="card-label">${p.additives.length ? `⚠ Additives & ingredients (${p.additives.length}) — tap any to learn more` : '✓ Additives'}</div>
      ${renderAdditives(p)}
    </div>
    ${renderBeneficial(p)}
    <div class="feedback-row"><button class="feedback-btn">Something wrong? Let us know →</button></div>
  `;
  document.getElementById('result-content').innerHTML = html;
  document.querySelector('.scroll').scrollTop = 0;
}

// Init — activate first button and load Nutella
document.querySelector('.switcher button').classList.add('active');
loadProduct('nutella');
</script>
